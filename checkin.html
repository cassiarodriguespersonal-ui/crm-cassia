<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in — Consultoria Cássia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --preto:#1A1714; --branco:#FFFFFF; --cinza:#F7F4F2;
    --bordo:#7C1B2A; --bordo-suave:#F4E7E9;
    --verde:#2F6B4F; --verde-suave:#E8F1EC;
    --texto-sec:rgba(26,23,20,.62); --texto-terc:rgba(26,23,20,.40);
    --serif:'Fraunces',serif; --sans:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--sans); background:var(--preto); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:20px; position:relative; overflow:hidden;
  }
  body::before{
    content:''; position:absolute; top:-120px; left:50%; transform:translateX(-50%);
    width:480px; height:480px; border-radius:50%;
    background:radial-gradient(circle, rgba(124,27,42,.45), transparent 70%);
  }

  .cartao{
    position:relative; z-index:1; background:var(--branco); width:100%; max-width:400px;
    border-radius:20px; padding:36px 30px; box-shadow:0 30px 80px -20px rgba(0,0,0,.5); text-align:center;
  }
  .marca{font-family:var(--serif); font-weight:600; font-size:13px; color:var(--bordo); text-transform:uppercase; letter-spacing:.06em;}
  .saudacao{font-family:var(--serif); font-size:23px; font-weight:600; margin-top:14px; color:var(--preto);}
  .subsaudacao{font-size:13px; color:var(--texto-sec); margin-top:6px; margin-bottom:28px;}

  .botao-checkin{
    width:140px; height:140px; border-radius:50%; border:none; margin:0 auto 24px;
    background:var(--bordo); color:var(--branco); display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px; cursor:pointer; transition:transform .15s ease, background .15s ease;
  }
  .botao-checkin:hover{transform:scale(1.03);}
  .botao-checkin:active{transform:scale(.97);}
  .botao-checkin .rotulo{font-weight:700; font-size:14px;}
  .botao-checkin.feito{background:var(--verde);}
  .botao-checkin.feito:hover{transform:none; cursor:default;}
  .botao-checkin:disabled{opacity:.6;}

  .campo-obs{margin-bottom:18px;}
  .campo-obs textarea{
    width:100%; border:1px solid rgba(26,23,20,.12); border-radius:10px; padding:11px 13px;
    font-family:var(--sans); font-size:13.5px; background:var(--cinza); resize:vertical;
  }
  .campo-obs textarea:focus{outline:none; border-color:var(--bordo);}

  .resumo-mes{
    background:var(--cinza); border-radius:12px; padding:14px; margin-top:6px;
    font-size:13px; color:var(--texto-sec);
  }
  .resumo-mes b{color:var(--bordo); font-family:var(--serif); font-size:18px; display:block; margin-bottom:2px;}

  .streak{display:flex; gap:5px; justify-content:center; margin-top:18px; flex-wrap:wrap;}
  .streak-dia{width:11px; height:11px; border-radius:3px; background:var(--cinza);}
  .streak-dia.feito{background:var(--verde);}

  .estado-erro{color:var(--bordo); font-size:13.5px; padding:20px 0;}
</style>
</head>
<body>

<div class="cartao" id="cartao">
  <div class="marca">Consultoria Cássia Rodrigues</div>
  <div class="saudacao" id="saudacao">Carregando...</div>
  <div class="subsaudacao" id="subsaudacao"></div>
  <div id="conteudo"></div>
</div>

<script>
  // ======================================================
  // Cole aqui a URL do Apps Script de Cadastro implantado
  // ======================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxfWT6FzUK0wD_FiS9yPA6Fxp_2pg2Fox4vffOfd2wAiajbcjLMvJ5ggG1NxkuCFX8/exec';

  const params = new URLSearchParams(window.location.search);
  const idAluna = params.get('id');

  async function apiGet(action, extraParams) {
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', action);
    Object.keys(extraParams || {}).forEach(function (k) { url.searchParams.set(k, extraParams[k]); });
    const resp = await fetch(url.toString());
    return resp.json();
  }

  async function apiPost(corpo) {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(corpo)
    });
    return resp.json();
  }

  function hojeISO() {
    return new Date().toISOString().slice(0, 10);
  }

  async function iniciar() {
    if (!idAluna) {
      document.getElementById('saudacao').textContent = 'Link incompleto';
      document.getElementById('conteudo').innerHTML = '<div class="estado-erro">Esse link não tem o código de identificação. Confirme com a Cássia.</div>';
      return;
    }

    try {
      const aluna = await apiGet('buscarAluna', { id: idAluna });
      if (aluna.erro) {
        document.getElementById('saudacao').textContent = 'Não encontrado';
        document.getElementById('conteudo').innerHTML = '<div class="estado-erro">' + aluna.erro + '. Confirme o link com a Cássia.</div>';
        return;
      }

      document.getElementById('saudacao').textContent = 'Oi, ' + aluna.nome.split(' ')[0] + '!';
      document.getElementById('subsaudacao').textContent = 'Confirme seu check-in de hoje';

      const checkins = await apiGet('checkinsDaAluna', { id: idAluna });
      const jaFezHoje = !checkins.erro && checkins.some(function (c) { return String(c.data).slice(0, 10) === hojeISO(); });
      const totalMes = !checkins.erro ? checkins.filter(function (c) { return String(c.data).slice(0, 7) === hojeISO().slice(0, 7); }).length : 0;

      renderizar(jaFezHoje, totalMes, checkins.erro ? [] : checkins);
    } catch (e) {
      document.getElementById('saudacao').textContent = 'Não consegui carregar';
      document.getElementById('conteudo').innerHTML = '<div class="estado-erro">Verifique sua internet e tente recarregar.</div>';
    }
  }

  function renderizar(jaFezHoje, totalMes, checkins) {
    const conteudo = document.getElementById('conteudo');

    conteudo.innerHTML =
      (!jaFezHoje ? '<div class="campo-obs"><textarea id="campoObs" rows="2" placeholder="Algo a registrar? (opcional)"></textarea></div>' : '') +
      '<button class="botao-checkin' + (jaFezHoje ? ' feito' : '') + '" id="btnCheckin"' + (jaFezHoje ? ' disabled' : '') + '>' +
        '<span style="font-size:28px;">' + (jaFezHoje ? '✓' : '💪') + '</span>' +
        '<span class="rotulo">' + (jaFezHoje ? 'Feito hoje' : 'Check-in') + '</span>' +
      '</button>' +
      '<div class="resumo-mes"><b>' + totalMes + '</b>check-ins este mês</div>' +
      '<div class="streak" id="streak"></div>';

    montarStreak(checkins);

    if (!jaFezHoje) {
      document.getElementById('btnCheckin').addEventListener('click', confirmarCheckin);
    }
  }

  function montarStreak(checkins) {
    const datasFeitas = new Set(checkins.map(function (c) { return String(c.data).slice(0, 10); }));
    const streak = document.getElementById('streak');
    streak.innerHTML = '';
    for (let i = 13; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const iso = d.toISOString().slice(0, 10);
      const quadrado = document.createElement('div');
      quadrado.className = 'streak-dia' + (datasFeitas.has(iso) ? ' feito' : '');
      streak.appendChild(quadrado);
    }
  }

  async function confirmarCheckin() {
    const btn = document.getElementById('btnCheckin');
    btn.disabled = true;
    btn.querySelector('.rotulo').textContent = 'Enviando...';

    const observacao = document.getElementById('campoObs') ? document.getElementById('campoObs').value.trim() : '';

    const resultado = await apiPost({ action: 'checkin', idAluna: idAluna, data: hojeISO(), observacao: observacao });

    if (resultado.erro && resultado.erro !== 'JA_FEITO') {
      btn.disabled = false;
      btn.querySelector('.rotulo').textContent = 'Tentar de novo';
      return;
    }

    iniciar();
  }

  iniciar();
</script>

</body>
</html>
