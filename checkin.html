<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in — Consultoria Cássia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#F7F4F2; --paper:#FFFFFF; --ink:#1A1714; --ink-soft:#5E5650;
    --accent:#7C1B2A; --accent-soft:#F2E1E3;
    --ok:#3E6650; --ok-soft:#DEEAE1;
    --line:#E6E1DE; --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--ink); color:var(--ink); font-family:'Inter',system-ui,sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    position:relative; overflow:hidden;
  }
  body::before{
    content:''; position:absolute; top:-130px; left:50%; transform:translateX(-50%);
    width:520px; height:520px; border-radius:50%;
    background:radial-gradient(circle, rgba(124,27,42,.45), transparent 70%);
  }
  h1,h2,h3{font-family:'Fraunces',serif; font-weight:600; margin:0; letter-spacing:-.01em;}

  .cartao{
    position:relative; z-index:1; background:var(--paper); width:100%; max-width:460px;
    border-radius:20px; box-shadow:0 30px 80px -20px rgba(0,0,0,.5); overflow:hidden;
  }
  .topo{padding:28px 28px 20px;}
  .marca{font-family:'Fraunces',serif; font-size:12.5px; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; font-weight:600;}
  .titulo{font-size:21px; margin-top:10px;}
  .subtitulo{font-size:13.5px; color:var(--ink-soft); margin-top:5px;}
  .corpo{padding:0 28px 28px;}

  .field{margin-bottom:18px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:8px;}
  .field input[type="number"], .field input[type="text"], .field textarea{
    width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:9px;
    font-family:'Inter',sans-serif; font-size:14px; background:var(--bg);
  }
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--accent);}
  .field textarea{resize:vertical;}

  .slider-row{display:flex; align-items:center; gap:12px;}
  .slider-row input[type="range"]{flex:1; accent-color:var(--accent);}
  .slider-valor{
    font-family:'Fraunces',serif; font-weight:600; font-size:17px; color:var(--accent);
    width:28px; text-align:center; flex-shrink:0;
  }
  .slider-legenda{display:flex; justify-content:space-between; font-size:10.5px; color:var(--ink-soft); margin-top:4px;}

  .toggle-row{display:flex; gap:8px;}
  .toggle-opcao{
    flex:1; text-align:center; padding:11px; border:1px solid var(--line); border-radius:9px;
    font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .toggle-opcao.ativo{background:var(--accent); border-color:var(--accent); color:#fff;}

  .humor-grid{display:grid; grid-template-columns:repeat(5, 1fr); gap:6px;}
  .humor-opcao{
    display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px;
    border:1px solid var(--line); border-radius:9px; cursor:pointer; text-align:center;
  }
  .humor-opcao span:last-child{font-size:9.5px; font-weight:600; color:var(--ink-soft); line-height:1.2;}
  .humor-emoji{font-size:19px;}
  .humor-opcao.ativo{background:var(--accent-soft); border-color:var(--accent);}
  .humor-opcao.ativo span:last-child{color:var(--accent);}

  .campo-condicional{display:none; margin-top:10px;}
  .campo-condicional.mostrar{display:block;}

  .ultimo-checkin{
    background:var(--bg); border-radius:var(--radius-sm); padding:11px 14px; margin-bottom:20px;
    font-size:12.5px; color:var(--ink-soft);
  }

  .btn{width:100%; border:none; padding:15px; border-radius:11px; font-weight:600; font-size:14.5px; cursor:pointer; font-family:'Inter',sans-serif;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:disabled{opacity:.5; cursor:default;}
  .btn-primary:not(:disabled):hover{background:#931F30;}

  .estado-aceito{text-align:center; padding:10px 0;}
  .selo{
    width:58px; height:58px; border-radius:50%; background:var(--ok-soft); color:var(--ok);
    display:flex; align-items:center; justify-content:center; font-size:26px; margin:6px auto 16px;
  }
  .estado-aceito p{font-size:13.5px; color:var(--ink-soft); line-height:1.6; margin:0;}

  .estado-erro{text-align:center; padding:20px 0; color:var(--accent); font-size:13.5px;}
</style>
</head>
<body>

<div class="cartao">
  <div class="topo">
    <div class="marca">Consultoria Cássia Rodrigues</div>
    <h1 class="titulo" id="titulo">Carregando...</h1>
    <div class="subtitulo" id="subtitulo"></div>
  </div>
  <div class="corpo" id="corpo"></div>
</div>

<iframe name="hiddenFrameCheckin" style="display:none;" title="envio em segundo plano"></iframe>

<script>
(function(){
  // ======= CONFIGURAÇÃO =======
  var GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbwxfWT6FzUK0wD_FiS9yPA6Fxp_2pg2Fox4vffOfd2wAiajbcjLMvJ5ggG1NxkuCFX8/exec";
  // =============================

  var params = new URLSearchParams(window.location.search);
  var nome = (params.get('nome') || '').trim();
  var tipoCheckin = params.get('tipo') || 'Semanal';
  var alunaEncontrada = null;

  function primeiroNome(nomeCompleto){
    return (nomeCompleto || '').trim().split(' ')[0] || 'você';
  }

  function formatarDataBR(valor){
    if (!valor) return null;
    var d = new Date(valor);
    if (isNaN(d.getTime())) return null;
    return d.toLocaleDateString('pt-BR');
  }

  function enviarAcao(payload){
    var form = document.createElement('form');
    form.method = 'POST';
    form.action = GOOGLE_SHEETS_URL;
    form.target = 'hiddenFrameCheckin';
    form.style.display = 'none';

    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify(payload);
    form.appendChild(input);

    document.body.appendChild(form);
    form.submit();
    setTimeout(function(){ if (form.parentNode) form.parentNode.removeChild(form); }, 1200);
  }

  function buscarAlunas(callback){
    var nomeCallback = '__checkinCallback' + Date.now();
    var timeout = setTimeout(function(){
      delete window[nomeCallback];
      callback(null);
    }, 12000);

    window[nomeCallback] = function(dados){
      clearTimeout(timeout);
      delete window[nomeCallback];
      tag.remove();
      callback(dados);
    };

    var tag = document.createElement('script');
    tag.src = GOOGLE_SHEETS_URL + '?callback=' + nomeCallback;
    tag.onerror = function(){ clearTimeout(timeout); delete window[nomeCallback]; callback(null); };
    document.body.appendChild(tag);
  }

  function iniciar(){
    if (!nome) {
      renderizarPedirNome();
      return;
    }
    carregarCheckinDe(nome);
  }

  function renderizarPedirNome(){
    document.getElementById('titulo').textContent = 'Check-in ' + tipoCheckin.toLowerCase();
    document.getElementById('subtitulo').textContent = 'Consultoria Cássia Rodrigues';

    document.getElementById('corpo').innerHTML =
      '<div class="field"><label>Pra começar, digite seu nome completo, igual está na sua ficha</label><input type="text" id="campoNomeProprio" placeholder="Seu nome completo"></div>' +
      '<button class="btn btn-primary" id="btnContinuarNome">Continuar</button>';

    var campo = document.getElementById('campoNomeProprio');
    var btn = document.getElementById('btnContinuarNome');

    function prosseguir(){
      var valor = campo.value.trim();
      if (!valor) { campo.focus(); return; }
      nome = valor;
      carregarCheckinDe(nome);
    }

    btn.addEventListener('click', prosseguir);
    campo.addEventListener('keydown', function(e){ if (e.key === 'Enter') prosseguir(); });
    campo.focus();
  }

  function carregarCheckinDe(nomeBuscado){
    document.getElementById('titulo').textContent = 'Check-in ' + tipoCheckin.toLowerCase();
    document.getElementById('subtitulo').textContent = 'Olá, ' + primeiroNome(nomeBuscado) + '! Leva menos de um minuto.';
    document.getElementById('corpo').innerHTML = '<div class="estado-erro" style="color:var(--ink-soft);">Carregando...</div>';

    buscarAlunas(function(lista){
      if (lista) {
        var chave = nomeBuscado.toLowerCase();
        alunaEncontrada = lista.filter(function(a){
          return String(a['Nome']||'').trim().toLowerCase() === chave;
        })[0];
      }
      renderizarFormulario();
    });
  }

  function mostrarErro(msg){
    document.getElementById('titulo').textContent = 'Não foi possível abrir';
    document.getElementById('corpo').innerHTML = '<div class="estado-erro">' + msg + '</div>';
  }

  function renderizarFormulario(){
    var ultimoTexto = '';
    if (alunaEncontrada && alunaEncontrada.ultimoCheckin) {
      var dataUltimo = formatarDataBR(alunaEncontrada.ultimoCheckin['Data/Hora']);
      if (dataUltimo) ultimoTexto = '<div class="ultimo-checkin">Seu último check-in foi em ' + dataUltimo + '.</div>';
    }

    document.getElementById('corpo').innerHTML =
      ultimoTexto +

      '<div class="field">' +
        '<label>Peso atual (kg) — opcional</label>' +
        '<input type="number" step="0.1" id="ckPeso" placeholder="Ex: 68.5">' +
      '</div>' +

      '<div class="field">' +
        '<label>Semana de treino — opcional</label>' +
        '<input type="text" id="ckSemana" placeholder="Ex: Semana 4">' +
      '</div>' +

      '<div class="field">' +
        '<label>Como está sua energia essa semana?</label>' +
        '<div class="slider-row"><input type="range" id="ckEnergia" min="1" max="10" value="6"><span class="slider-valor" id="ckEnergiaValor">6</span></div>' +
        '<div class="slider-legenda"><span>Esgotada</span><span>Cheia de energia</span></div>' +
      '</div>' +

      '<div class="field">' +
        '<label>E o seu humor, de modo geral?</label>' +
        '<div class="humor-grid" id="ckHumorGrid"></div>' +
      '</div>' +

      '<div class="field">' +
        '<label>Sentiu alguma dor essa semana?</label>' +
        '<div class="toggle-row">' +
          '<div class="toggle-opcao" id="ckDorNao">Não</div>' +
          '<div class="toggle-opcao" id="ckDorSim">Sim</div>' +
        '</div>' +
        '<div class="campo-condicional" id="ckDorOndeWrap">' +
          '<input type="text" id="ckDorOnde" placeholder="Onde foi a dor?">' +
        '</div>' +
      '</div>' +

      '<div class="field">' +
        '<label>Qual foi sua maior dificuldade essa semana? — opcional</label>' +
        '<input type="text" id="ckDificuldade" placeholder="Ex: tempo, cansaço, rotina...">' +
      '</div>' +

      '<div class="field">' +
        '<label>Algo mais que queira me contar? — opcional</label>' +
        '<textarea id="ckObservacao" rows="3"></textarea>' +
      '</div>' +

      '<button class="btn btn-primary" id="btnEnviarCheckin">Enviar check-in</button>';

    ligarSlider('ckEnergia', 'ckEnergiaValor');
    ligarHumor();
    ligarToggleDor();

    document.getElementById('btnEnviarCheckin').addEventListener('click', enviarCheckin);
  }

  function ligarSlider(idInput, idValor){
    var input = document.getElementById(idInput);
    var valor = document.getElementById(idValor);
    input.addEventListener('input', function(){ valor.textContent = input.value; });
  }

  // Mesmas 5 categorias e emojis que o painel (app.js) já usa para exibir o
  // humor na listagem de check-ins — mantendo os dois lados compatíveis.
  var OPCOES_HUMOR = [
    { valor: 'Animada', emoji: '😊' },
    { valor: 'Tranquila', emoji: '🙂' },
    { valor: 'Cansada', emoji: '😮\u200d💨' },
    { valor: 'Estressada', emoji: '😣' },
    { valor: 'Desanimada', emoji: '😔' }
  ];
  var humorSelecionado = '';

  function ligarHumor(){
    var grid = document.getElementById('ckHumorGrid');
    grid.innerHTML = OPCOES_HUMOR.map(function(op){
      return '<div class="humor-opcao" data-valor="' + op.valor + '">' +
        '<span class="humor-emoji">' + op.emoji + '</span><span>' + op.valor + '</span>' +
        '</div>';
    }).join('');

    grid.querySelectorAll('.humor-opcao').forEach(function(el){
      el.addEventListener('click', function(){
        humorSelecionado = el.getAttribute('data-valor');
        grid.querySelectorAll('.humor-opcao').forEach(function(o){ o.classList.remove('ativo'); });
        el.classList.add('ativo');
      });
    });
  }

  var dorSelecionada = 'Não';
  function ligarToggleDor(){
    var btnNao = document.getElementById('ckDorNao');
    var btnSim = document.getElementById('ckDorSim');
    var wrap = document.getElementById('ckDorOndeWrap');

    function selecionar(valor){
      dorSelecionada = valor;
      btnNao.classList.toggle('ativo', valor === 'Não');
      btnSim.classList.toggle('ativo', valor === 'Sim');
      wrap.classList.toggle('mostrar', valor === 'Sim');
    }

    btnNao.addEventListener('click', function(){ selecionar('Não'); });
    btnSim.addEventListener('click', function(){ selecionar('Sim'); });
    selecionar('Não');
  }

  function enviarCheckin(){
    var btn = document.getElementById('btnEnviarCheckin');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    enviarAcao({
      tipo: 'checkin',
      nome: nome,
      tipoCheckin: tipoCheckin,
      peso: document.getElementById('ckPeso').value,
      semana: document.getElementById('ckSemana').value,
      dor: dorSelecionada,
      dorOnde: dorSelecionada === 'Sim' ? document.getElementById('ckDorOnde').value : '',
      energia: document.getElementById('ckEnergia').value,
      humor: humorSelecionado,
      dificuldade: document.getElementById('ckDificuldade').value,
      observacao: document.getElementById('ckObservacao').value
    });

    setTimeout(renderizarConfirmacao, 900);
  }

  function renderizarConfirmacao(){
    document.getElementById('titulo').textContent = 'Check-in enviado';
    document.getElementById('subtitulo').textContent = '';
    document.getElementById('corpo').innerHTML =
      '<div class="estado-aceito">' +
        '<div class="selo">✓</div>' +
        '<p>Recebido, ' + primeiroNome(nome) + '! Cássia já vai dar uma olhada. Até o próximo check-in. 💪</p>' +
      '</div>';
  }

  iniciar();
})();
</script>

</body>
</html>
