<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro central — Consultoria Cássia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="protecao-painel.js"></script>
<style>
  :root{
    --preto:#1A1714; --branco:#FFFFFF; --cinza:#F7F4F2;
    --bordo:#7C1B2A; --bordo-suave:#F4E7E9;
    --verde:#2F6B4F; --verde-suave:#E8F1EC;
    --texto-sec:rgba(26,23,20,.62); --texto-terc:rgba(26,23,20,.40);
    --borda:rgba(26,23,20,.10);
    --serif:'Fraunces',serif; --sans:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--sans); background:var(--cinza); color:var(--preto); -webkit-font-smoothing:antialiased;}
  button{font-family:var(--sans); cursor:pointer;}

  .cabecalho{
    background:var(--preto); color:var(--branco); padding:22px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .marca{font-family:var(--serif); font-weight:600; font-size:17px;}
  .marca span{display:block; font-family:var(--sans); font-weight:400; font-size:11px; color:rgba(255,255,255,.5); margin-top:2px;}
  .btn-sair{background:none; border:1px solid rgba(255,255,255,.25); color:rgba(255,255,255,.8); padding:10px 16px; border-radius:9px; font-size:13px;}

  .layout{max-width:1100px; margin:0 auto; padding:22px; display:grid; grid-template-columns:300px 1fr; gap:22px; align-items:start;}

  .cartao{background:var(--branco); border:1px solid var(--borda); border-radius:16px; padding:20px;}

  .lista-titulo{font-family:var(--serif); font-weight:600; font-size:15px; margin-bottom:14px;}
  .btn-novo{
    width:100%; background:var(--bordo-suave); color:var(--bordo); border:1px dashed var(--bordo);
    padding:11px; border-radius:9px; font-weight:600; font-size:13px; margin-bottom:14px;
  }
  .btn-novo:hover{background:var(--bordo); color:var(--branco); border-style:solid;}

  .item-aluna{padding:12px; border-radius:10px; cursor:pointer; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .item-aluna:hover{background:var(--cinza);}
  .item-aluna.ativo{background:var(--bordo-suave);}
  .item-aluna .nome{font-size:13.5px; font-weight:600;}
  .badge-mes{
    font-family:var(--mono); font-size:11px; background:var(--verde-suave); color:var(--verde);
    padding:3px 8px; border-radius:20px; flex-shrink:0;
  }
  .badge-mes.zero{background:var(--cinza); color:var(--texto-terc);}

  .campo{margin-bottom:14px;}
  .campo label{display:block; font-size:12px; font-weight:600; color:var(--texto-sec); margin-bottom:6px;}
  .campo input{width:100%; padding:11px 13px; border:1px solid var(--borda); border-radius:9px; font-size:14px; background:var(--cinza);}
  .campo input:focus{outline:none; border-color:var(--bordo);}
  .linha-dupla{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .btn-salvar-aluna{background:var(--bordo); color:var(--branco); border:none; padding:12px 20px; border-radius:9px; font-weight:600; font-size:13.5px;}
  .btn-salvar-aluna:hover{background:#931F30;}

  .vazio-detalhe{text-align:center; color:var(--texto-terc); padding:80px 20px; font-size:13.5px;}

  .perfil-topo{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; flex-wrap:wrap; gap:14px;}
  .perfil-nome{font-family:var(--serif); font-size:21px; font-weight:600;}
  .perfil-id{font-family:var(--mono); font-size:11.5px; color:var(--texto-terc); margin-top:4px;}

  .link-checkin{
    background:var(--verde-suave); border:1px dashed var(--verde); border-radius:10px; padding:14px 16px; margin-bottom:22px;
  }
  .link-checkin .titulo-link{font-size:11.5px; font-weight:700; color:var(--verde); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px;}
  .link-checkin .url{font-family:var(--mono); font-size:12px; color:var(--preto); word-break:break-all; margin-bottom:10px;}
  .link-acoes{display:flex; gap:8px;}
  .link-acoes button{flex:1; padding:9px; border-radius:7px; font-size:12.5px; font-weight:600; border:none;}
  .btn-copiar-link{background:var(--branco); color:var(--verde); border:1px solid var(--verde) !important;}
  .btn-enviar-wpp{background:var(--verde); color:var(--branco);}

  .secao-titulo{font-family:var(--serif); font-weight:600; font-size:15px; margin-bottom:14px;}

  .grafico-mensal{display:flex; align-items:flex-end; gap:10px; height:120px; margin-bottom:8px; padding:0 4px;}

  .perfil-altura{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--texto-sec); margin-top:6px;}
  .perfil-altura input{width:70px; padding:5px 8px; border:1px solid var(--borda); border-radius:6px; font-size:12.5px; background:var(--cinza);}
  .btn-editar-altura{background:none; border:none; color:var(--bordo); font-size:12px; font-weight:600; padding:2px 4px;}
  .btn-salvar-altura{background:var(--bordo); color:var(--branco); border:none; padding:4px 10px; border-radius:6px; font-size:11.5px; font-weight:600;}

  .chips-metricas{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;}
  .chip-metrica{
    padding:7px 13px; border-radius:20px; border:1px solid var(--borda); background:var(--branco);
    font-size:12px; font-weight:600; color:var(--texto-sec);
  }
  .chip-metrica.ativo{background:var(--bordo); border-color:var(--bordo); color:var(--branco);}

  .grafico-evolucao{background:var(--cinza); border-radius:12px; padding:14px; margin-bottom:18px;}

  .btn-nova-medicao{
    background:var(--bordo-suave); color:var(--bordo); border:1px dashed var(--bordo); width:100%;
    padding:11px; border-radius:9px; font-weight:600; font-size:13px; margin-bottom:16px;
  }
  .btn-nova-medicao:hover{background:var(--bordo); color:var(--branco); border-style:solid;}

  .form-medicao{display:none; background:var(--cinza); border-radius:12px; padding:16px; margin-bottom:18px;}
  .form-medicao.aberto{display:block;}
  .linha-tripla{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  .linha-quadrupla{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;}

  .historico-evolucao-item{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--borda); font-size:13px;}
  .historico-evolucao-item:last-child{border-bottom:none;}
  .delta-valor{font-size:11px; font-weight:600; margin-left:6px;}
  .delta-valor.positivo{color:var(--verde);}
  .delta-valor.negativo{color:var(--bordo);}

  .card-contrato{border-radius:10px; padding:14px 16px; margin-bottom:22px;}
  .card-contrato.pendente{background:var(--bordo-suave); border:1px dashed var(--bordo);}
  .card-contrato.aceito{background:var(--verde-suave); border:1px dashed var(--verde);}
  .card-contrato.semcontrato{background:var(--cinza); border:1px dashed var(--borda);}
  .contrato-topo{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .contrato-titulo{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;}
  .badge-status{font-family:var(--mono); font-size:10.5px; padding:3px 9px; border-radius:20px; font-weight:600;}
  .badge-status.pendente{background:var(--bordo); color:var(--branco);}
  .badge-status.aceito{background:var(--verde); color:var(--branco);}
  .contrato-detalhe{font-size:12.5px; color:var(--texto-sec); margin-bottom:10px;}
  .btn-contrato-acao{width:100%; border:none; padding:9px; border-radius:7px; font-size:12.5px; font-weight:600; background:var(--bordo); color:var(--branco);}

  .barra-mes{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
  .barra-mes .valor{font-family:var(--mono); font-size:11px; color:var(--texto-sec); margin-bottom:4px;}
  .barra-mes .coluna{width:60%; background:var(--bordo-suave); border-radius:5px 5px 0 0; transition:height .3s ease;}
  .barra-mes.atual .coluna{background:var(--bordo);}
  .barra-mes .rotulo{font-size:10.5px; color:var(--texto-terc); margin-top:6px; text-transform:uppercase;}

  .historico-item{display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid var(--borda); font-size:13.5px;}
  .historico-item:last-child{border-bottom:none;}
  .historico-data{font-family:var(--mono); font-size:12.5px; color:var(--texto-sec);}
  .historico-obs{font-size:12.5px; color:var(--texto-terc); font-style:italic; margin-top:2px;}

  .sem-checkins{color:var(--texto-terc); font-size:13px; padding:20px 0; text-align:center;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--preto); color:var(--branco); padding:13px 20px; border-radius:10px; font-size:13.5px;
    opacity:0; transition:all .25s ease; z-index:100; pointer-events:none;
  }
  .toast.mostrar{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (max-width:860px){
    .layout{grid-template-columns:1fr; padding:14px;}
  }
</style>
</head>
<body>

<div class="cabecalho">
  <div class="marca">Cássia Rodrigues<span>Cadastro central de alunas</span></div>
  <button class="btn-sair" onclick="sairDoPainel()">Sair</button>
</div>

<div class="layout">

  <div class="cartao">
    <div class="lista-titulo">Alunas cadastradas</div>
    <button class="btn-novo" id="btnNovaAluna">+ Nova aluna</button>
    <div id="listaAlunas"><div style="color:var(--texto-terc); font-size:13px;">Carregando...</div></div>
  </div>

  <div class="cartao" id="painelDetalhe">
    <div class="vazio-detalhe">Selecione uma aluna ao lado, ou cadastre uma nova para ver o ID único, o link de check-in e o progresso mensal.</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ======================================================
  // Cole aqui a URL do Apps Script de Cadastro implantado
  // ======================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxfWT6FzUK0wD_FiS9yPA6Fxp_2pg2Fox4vffOfd2wAiajbcjLMvJ5ggG1NxkuCFX8/exec';

  // Endereço onde o checkin.html vai estar publicado (sem barra no fim)
  const URL_BASE_SITE = 'https://SEU-SITE-AQUI';

  const NOMES_MES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  let alunaSelecionadaId = null;

  async function apiGet(action, params) {
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', action);
    Object.keys(params || {}).forEach(function (k) { url.searchParams.set(k, params[k]); });
    const resp = await fetch(url.toString());
    return resp.json();
  }

  async function apiPost(corpo) {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(corpo)
    });
    return resp.json();
  }

  function mostrarToast(texto) {
    const toast = document.getElementById('toast');
    toast.textContent = texto;
    toast.classList.add('mostrar');
    setTimeout(function () { toast.classList.remove('mostrar'); }, 3000);
  }

  async function carregarLista() {
    const [alunas, resumo] = await Promise.all([apiGet('listarAlunas', {}), apiGet('resumoGeral', {})]);
    const container = document.getElementById('listaAlunas');

    if (alunas.erro) {
      container.innerHTML = '<div style="font-size:12.5px; color:var(--texto-terc);">Configure a URL do Apps Script no topo do script.</div>';
      return;
    }
    if (!alunas.length) {
      container.innerHTML = '<div style="font-size:12.5px; color:var(--texto-terc);">Nenhuma aluna cadastrada ainda.</div>';
      return;
    }

    const mapaResumo = {};
    (resumo.erro ? [] : resumo).forEach(function (r) { mapaResumo[r.id] = r.checkinsMesAtual; });

    container.innerHTML = alunas.map(function (a) {
      const total = mapaResumo[a.id] || 0;
      return '<div class="item-aluna" data-id="' + a.id + '">' +
        '<div class="nome">' + a.nome + '</div>' +
        '<div class="badge-mes' + (total === 0 ? ' zero' : '') + '">' + total + ' este mês</div>' +
        '</div>';
    }).join('');

    container.querySelectorAll('.item-aluna').forEach(function (el) {
      el.addEventListener('click', function () { abrirDetalhe(el.dataset.id); });
    });
  }

  document.getElementById('btnNovaAluna').addEventListener('click', function () {
    alunaSelecionadaId = null;
    document.querySelectorAll('.item-aluna').forEach(function (el) { el.classList.remove('ativo'); });

    document.getElementById('painelDetalhe').innerHTML =
      '<div class="secao-titulo">Cadastrar nova aluna</div>' +
      '<div class="linha-tripla">' +
        '<div class="campo"><label>Nome</label><input type="text" id="campoNovoNome" placeholder="Ex: Mariana Costa"></div>' +
        '<div class="campo"><label>WhatsApp (com DDD)</label><input type="text" id="campoNovoTelefone" placeholder="91999999999"></div>' +
        '<div class="campo"><label>Altura (cm)</label><input type="number" id="campoNovaAltura" placeholder="165"></div>' +
      '</div>' +
      '<button class="btn-salvar-aluna" id="btnConfirmarNova">Gerar ID e cadastrar</button>';

    document.getElementById('btnConfirmarNova').addEventListener('click', async function () {
      const nome = document.getElementById('campoNovoNome').value.trim();
      const telefone = document.getElementById('campoNovoTelefone').value.replace(/\D/g, '');
      const altura = document.getElementById('campoNovaAltura').value;
      if (!nome) { mostrarToast('Preencha o nome da aluna.'); return; }

      const resultado = await apiPost({ action: 'criarAluna', nome: nome, telefone: telefone, altura: altura });
      if (resultado.erro) { mostrarToast('Erro: ' + resultado.erro); return; }

      mostrarToast('Aluna cadastrada.');
      await carregarLista();
      abrirDetalhe(resultado.id);
    });
  });

  const ROTULOS_METRICA = {
    peso: 'Peso (kg)', cintura: 'Cintura (cm)', abdomen: 'Abdômen (cm)',
    quadril: 'Quadril (cm)', braco: 'Braço (cm)', coxa: 'Coxa (cm)', panturrilha: 'Panturrilha (cm)'
  };

  let medicoesCarregadas = [];
  let metricaAtiva = 'peso';
  let alunaAtualAltura = '';
  let contratoCarregadoAdmin = null;

  async function abrirDetalhe(id) {
    alunaSelecionadaId = id;
    document.querySelectorAll('.item-aluna').forEach(function (el) {
      el.classList.toggle('ativo', el.dataset.id === id);
    });

    const painel = document.getElementById('painelDetalhe');
    painel.innerHTML = '<div class="vazio-detalhe">Carregando...</div>';

    const [aluna, checkins, mensal, medicoes, contrato] = await Promise.all([
      apiGet('buscarAluna', { id: id }),
      apiGet('checkinsDaAluna', { id: id }),
      apiGet('resumoMensal', { id: id }),
      apiGet('medicoesDaAluna', { id: id }),
      apiGet('buscarContrato', { id: id })
    ]);

    if (aluna.erro) { painel.innerHTML = '<div class="vazio-detalhe">' + aluna.erro + '</div>'; return; }

    medicoesCarregadas = medicoes.erro ? [] : medicoes;
    contratoCarregadoAdmin = contrato.erro ? null : contrato;
    alunaAtualAltura = aluna.altura || '';
    metricaAtiva = 'peso';

    const link = URL_BASE_SITE + '/checkin.html?id=' + id;
    const linkContrato = URL_BASE_SITE + '/contrato.html?id=' + id;
    const maiorValor = Math.max.apply(null, mensal.map(function (m) { return m.total; }).concat([1]));
    const mesAtualChave = new Date().toISOString().slice(0, 7);

    const graficoHtml = mensal.map(function (m) {
      const altura = Math.max((m.total / maiorValor) * 100, m.total > 0 ? 8 : 2);
      const partes = m.mes.split('-');
      const rotulo = NOMES_MES[Number(partes[1]) - 1];
      return '<div class="barra-mes' + (m.mes === mesAtualChave ? ' atual' : '') + '">' +
        '<div class="valor">' + m.total + '</div>' +
        '<div class="coluna" style="height:' + altura + '%"></div>' +
        '<div class="rotulo">' + rotulo + '</div>' +
        '</div>';
    }).join('');

    const historicoHtml = checkins.length
      ? checkins.slice(0, 20).map(function (c) {
          const data = new Date(c.data + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
          return '<div class="historico-item"><div><div>' + data + '</div>' +
            (c.observacao ? '<div class="historico-obs">' + c.observacao + '</div>' : '') +
            '</div></div>';
        }).join('')
      : '<div class="sem-checkins">Nenhum check-in registrado ainda.</div>';

    painel.innerHTML =
      '<div class="perfil-topo">' +
        '<div>' +
          '<div class="perfil-nome">' + aluna.nome + '</div>' +
          '<div class="perfil-id">ID ' + aluna.id + (aluna.telefone ? ' · ' + aluna.telefone : '') + '</div>' +
          '<div class="perfil-altura" id="blocoAltura"></div>' +
        '</div>' +
      '</div>' +

      '<div class="link-checkin">' +
        '<div class="titulo-link">Link de check-in dela</div>' +
        '<div class="url">' + link + '</div>' +
        '<div class="link-acoes">' +
          '<button class="btn-copiar-link" id="btnCopiarCheckin">Copiar link</button>' +
          '<button class="btn-enviar-wpp" id="btnEnviarCheckin">Enviar no WhatsApp</button>' +
        '</div>' +
      '</div>' +

      montarCardContrato(aluna, linkContrato) +

      '<div class="secao-titulo">Somatório mensal de check-ins</div>' +
      '<div class="grafico-mensal">' + graficoHtml + '</div>' +

      '<div class="secao-titulo" style="margin-top:24px;">Progresso recente</div>' +
      historicoHtml +

      '<div class="secao-titulo" style="margin-top:28px;">Evolução física</div>' +
      '<button class="btn-nova-medicao" id="btnNovaMedicao">+ Registrar nova medição</button>' +
      '<div class="form-medicao" id="formMedicao">' +
        '<div class="linha-dupla">' +
          '<div class="campo"><label>Data</label><input type="date" id="medData"></div>' +
          '<div class="campo"><label>Peso (kg)</label><input type="number" step="0.1" id="medPeso"></div>' +
        '</div>' +
        '<div class="linha-tripla">' +
          '<div class="campo"><label>Cintura (cm)</label><input type="number" step="0.1" id="medCintura"></div>' +
          '<div class="campo"><label>Abdômen (cm)</label><input type="number" step="0.1" id="medAbdomen"></div>' +
          '<div class="campo"><label>Quadril (cm)</label><input type="number" step="0.1" id="medQuadril"></div>' +
        '</div>' +
        '<div class="linha-tripla">' +
          '<div class="campo"><label>Braço (cm)</label><input type="number" step="0.1" id="medBraco"></div>' +
          '<div class="campo"><label>Coxa (cm)</label><input type="number" step="0.1" id="medCoxa"></div>' +
          '<div class="campo"><label>Panturrilha (cm)</label><input type="number" step="0.1" id="medPanturrilha"></div>' +
        '</div>' +
        '<div class="campo"><label>Observação</label><input type="text" id="medObs" placeholder="Opcional"></div>' +
        '<button class="btn-salvar-aluna" id="btnSalvarMedicao">Salvar medição</button>' +
      '</div>' +

      '<div class="chips-metricas" id="chipsMetricas"></div>' +
      '<div class="grafico-evolucao" id="containerGrafico"></div>' +
      '<div id="historicoEvolucao"></div>';

    renderizarAltura(aluna);
    renderizarChipsMetricas();
    renderizarGraficoEvolucao();
    renderizarHistoricoEvolucao();

    document.getElementById('btnNovaMedicao').addEventListener('click', function () {
      document.getElementById('medData').value = new Date().toISOString().slice(0, 10);
      document.getElementById('formMedicao').classList.toggle('aberto');
    });

    document.getElementById('btnSalvarMedicao').addEventListener('click', async function () {
      const corpo = {
        action: 'registrarMedicao',
        idAluna: id,
        data: document.getElementById('medData').value || new Date().toISOString().slice(0, 10),
        peso: document.getElementById('medPeso').value,
        cintura: document.getElementById('medCintura').value,
        abdomen: document.getElementById('medAbdomen').value,
        quadril: document.getElementById('medQuadril').value,
        braco: document.getElementById('medBraco').value,
        coxa: document.getElementById('medCoxa').value,
        panturrilha: document.getElementById('medPanturrilha').value,
        observacao: document.getElementById('medObs').value
      };
      const resultado = await apiPost(corpo);
      if (resultado.erro) { mostrarToast('Erro: ' + resultado.erro); return; }
      mostrarToast('Medição registrada.');
      abrirDetalhe(id);
    });

    document.getElementById('btnCopiarCheckin').addEventListener('click', function () {
      navigator.clipboard.writeText(link);
      mostrarToast('Link copiado.');
    });
    document.getElementById('btnEnviarCheckin').addEventListener('click', function () {
      const msg = encodeURIComponent('Oi, ' + aluna.nome.split(' ')[0] + '! Esse é o seu link de check-in, é só abrir e confirmar quando treinar: ' + link);
      window.open('https://wa.me/55' + (aluna.telefone || '') + '?text=' + msg, '_blank');
    });

    ligarAcoesContrato(aluna, linkContrato, id);
  }

  function montarCardContrato(aluna, linkContrato) {
    if (!contratoCarregadoAdmin) {
      return '<div class="card-contrato semcontrato">' +
        '<div class="contrato-topo"><div class="contrato-titulo">Contrato digital</div></div>' +
        '<div class="contrato-detalhe">Nenhum contrato foi gerado para essa aluna ainda.</div>' +
        '<button class="btn-contrato-acao" id="btnGerarContrato">Gerar contrato</button>' +
      '</div>';
    }

    if (contratoCarregadoAdmin.status === 'aceito') {
      return '<div class="card-contrato aceito">' +
        '<div class="contrato-topo"><div class="contrato-titulo">Contrato digital</div><span class="badge-status aceito">Aceito</span></div>' +
        '<div class="contrato-detalhe">Aceito em ' + formatarDataBR(contratoCarregadoAdmin.dataAceite) + ' às ' + contratoCarregadoAdmin.horaAceite + ' · versão ' + contratoCarregadoAdmin.versao + '</div>' +
      '</div>';
    }

    return '<div class="card-contrato pendente">' +
      '<div class="contrato-topo"><div class="contrato-titulo">Contrato digital</div><span class="badge-status pendente">Pendente</span></div>' +
      '<div class="contrato-detalhe">Gerado em ' + formatarDataBR(contratoCarregadoAdmin.dataGeracao) + ', aguardando aceite. ' + linkContrato + '</div>' +
      '<div class="link-acoes">' +
        '<button class="btn-copiar-link" id="btnCopiarContrato">Copiar link</button>' +
        '<button class="btn-enviar-wpp" id="btnEnviarContrato">Enviar no WhatsApp</button>' +
      '</div>' +
    '</div>';
  }

  function formatarDataBR(iso) {
    if (!iso) return '—';
    const partes = String(iso).slice(0, 10).split('-');
    return partes[2] + '/' + partes[1] + '/' + partes[0];
  }

  function ligarAcoesContrato(aluna, linkContrato, id) {
    const btnGerar = document.getElementById('btnGerarContrato');
    if (btnGerar) {
      btnGerar.addEventListener('click', async function () {
        btnGerar.disabled = true;
        btnGerar.textContent = 'Gerando...';
        const resultado = await apiPost({ action: 'gerarContrato', idAluna: id });
        if (resultado.erro) { mostrarToast('Erro: ' + resultado.erro); return; }
        mostrarToast('Contrato gerado.');
        abrirDetalhe(id);
      });
    }

    const btnCopiar = document.getElementById('btnCopiarContrato');
    if (btnCopiar) {
      btnCopiar.addEventListener('click', function () {
        navigator.clipboard.writeText(linkContrato);
        mostrarToast('Link copiado.');
      });
    }

    const btnEnviar = document.getElementById('btnEnviarContrato');
    if (btnEnviar) {
      btnEnviar.addEventListener('click', function () {
        const msg = encodeURIComponent('Oi, ' + aluna.nome.split(' ')[0] + '! Antes de começarmos, preciso que você leia e aceite o contrato: ' + linkContrato);
        window.open('https://wa.me/55' + (aluna.telefone || '') + '?text=' + msg, '_blank');
      });
    }
  }

  function renderizarAltura(aluna) {
    const bloco = document.getElementById('blocoAltura');
    bloco.innerHTML = aluna.altura
      ? 'Altura ' + aluna.altura + ' cm <button class="btn-editar-altura" id="btnEditarAltura">editar</button>'
      : '<button class="btn-editar-altura" id="btnEditarAltura">+ adicionar altura</button>';

    document.getElementById('btnEditarAltura').addEventListener('click', function () {
      bloco.innerHTML =
        '<input type="number" id="inputAltura" placeholder="cm" value="' + (aluna.altura || '') + '">' +
        '<button class="btn-salvar-altura" id="btnConfirmarAltura">salvar</button>';
      document.getElementById('btnConfirmarAltura').addEventListener('click', async function () {
        const novaAltura = document.getElementById('inputAltura').value;
        await apiPost({ action: 'atualizarAluna', id: aluna.id, altura: novaAltura });
        alunaAtualAltura = novaAltura;
        aluna.altura = novaAltura;
        renderizarAltura(aluna);
        renderizarGraficoEvolucao();
        renderizarHistoricoEvolucao();
        mostrarToast('Altura atualizada.');
      });
    });
  }

  function renderizarChipsMetricas() {
    const container = document.getElementById('chipsMetricas');
    container.innerHTML = Object.keys(ROTULOS_METRICA).map(function (chave) {
      return '<button class="chip-metrica' + (chave === metricaAtiva ? ' ativo' : '') + '" data-metrica="' + chave + '">' + ROTULOS_METRICA[chave] + '</button>';
    }).join('');

    container.querySelectorAll('.chip-metrica').forEach(function (chip) {
      chip.addEventListener('click', function () {
        metricaAtiva = chip.dataset.metrica;
        container.querySelectorAll('.chip-metrica').forEach(function (c) { c.classList.toggle('ativo', c === chip); });
        renderizarGraficoEvolucao();
      });
    });
  }

  function renderizarGraficoEvolucao() {
    const pontos = medicoesCarregadas
      .filter(function (m) { return m[metricaAtiva] !== '' && m[metricaAtiva] !== undefined && m[metricaAtiva] !== null; })
      .map(function (m) { return { data: m.data, valor: Number(m[metricaAtiva]) }; });

    document.getElementById('containerGrafico').innerHTML = gerarSvgLinha(pontos);
  }

  function gerarSvgLinha(pontos) {
    if (!pontos.length) return '<div class="sem-checkins">Sem dados registrados ainda para esse indicador.</div>';
    if (pontos.length === 1) return '<div class="sem-checkins">Só uma medição registrada até agora. O gráfico aparece a partir da segunda.</div>';

    const largura = 560, altura = 160, margem = 26;
    const valores = pontos.map(function (p) { return p.valor; });
    const minV = Math.min.apply(null, valores);
    const maxV = Math.max.apply(null, valores);
    const faixa = (maxV - minV) || 1;

    const coordX = function (i) { return margem + (i / (pontos.length - 1)) * (largura - margem * 2); };
    const coordY = function (v) { return altura - margem - ((v - minV) / faixa) * (altura - margem * 2 - 10) - 5; };

    const linha = pontos.map(function (p, i) { return coordX(i) + ',' + coordY(p.valor); }).join(' ');
    const circulos = pontos.map(function (p, i) {
      return '<circle cx="' + coordX(i) + '" cy="' + coordY(p.valor) + '" r="4" fill="#7C1B2A"></circle>';
    }).join('');

    const rotulos = pontos.map(function (p, i) {
      if (i !== 0 && i !== pontos.length - 1) return '';
      const data = new Date(p.data + 'T00:00:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
      return '<text x="' + coordX(i) + '" y="' + (altura - 4) + '" font-size="10" fill="rgba(26,23,20,.5)" text-anchor="' + (i === 0 ? 'start' : 'end') + '">' + data + '</text>';
    }).join('');

    return '<svg viewBox="0 0 ' + largura + ' ' + altura + '" style="width:100%; height:160px;">' +
      '<polyline points="' + linha + '" fill="none" stroke="#7C1B2A" stroke-width="2.5"></polyline>' +
      circulos + rotulos +
      '</svg>';
  }

  function renderizarHistoricoEvolucao() {
    const container = document.getElementById('historicoEvolucao');
    if (!medicoesCarregadas.length) {
      container.innerHTML = '<div class="sem-checkins">Nenhuma medição registrada ainda.</div>';
      return;
    }

    const ordenadas = medicoesCarregadas.slice().reverse();

    container.innerHTML = ordenadas.map(function (m, i) {
      const anterior = ordenadas[i + 1];
      const data = new Date(m.data + 'T00:00:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', year: 'numeric' });

      let imcTexto = '';
      if (m.peso && alunaAtualAltura) {
        const alturaM = alunaAtualAltura / 100;
        const imc = m.peso / (alturaM * alturaM);
        imcTexto = ' · IMC ' + imc.toFixed(1);
      }

      let deltaTexto = '';
      if (anterior && m.peso && anterior.peso) {
        const dif = (Number(m.peso) - Number(anterior.peso)).toFixed(1);
        const classe = dif <= 0 ? 'positivo' : 'negativo';
        const sinal = dif > 0 ? '+' : '';
        deltaTexto = '<span class="delta-valor ' + classe + '">' + sinal + dif + 'kg</span>';
      }

      return '<div class="historico-evolucao-item"><div>' + data + imcTexto + '</div><div>' +
        (m.peso ? m.peso + 'kg' : '') + deltaTexto +
        '</div></div>';
    }).join('');
  }



  carregarLista();
</script>

</body>
</html>
