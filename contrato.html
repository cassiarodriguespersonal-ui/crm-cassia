<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrato Digital — Consultoria Cássia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --bg:#F7F4F2; --paper:#FFFFFF; --ink:#1A1714; --ink-soft:#5E5650;
    --accent:#7C1B2A; --accent-soft:#F2E1E3;
    --ok:#3E6650; --ok-soft:#DEEAE1;
    --line:#E6E1DE; --radius:16px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(26,23,20,.04), 0 8px 24px rgba(26,23,20,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--ink); color:var(--ink); font-family:'Inter',system-ui,sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    position:relative; overflow:hidden;
  }
  body::before{
    content:''; position:absolute; top:-130px; left:50%; transform:translateX(-50%);
    width:520px; height:520px; border-radius:50%;
    background:radial-gradient(circle, rgba(124,27,42,.45), transparent 70%);
  }
  h1,h2,h3{font-family:'Fraunces',serif; font-weight:600; margin:0; letter-spacing:-.01em;}

  .cartao{
    position:relative; z-index:1; background:var(--paper); width:100%; max-width:480px;
    border-radius:20px; box-shadow:0 30px 80px -20px rgba(0,0,0,.5); overflow:hidden;
  }
  .topo{padding:30px 30px 24px;}
  .marca{font-family:'Fraunces',serif; font-size:12.5px; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; font-weight:600;}
  .titulo{font-size:21px; margin-top:10px;}
  .subtitulo{font-size:13.5px; color:var(--ink-soft); margin-top:5px;}
  .corpo{padding:0 30px 30px;}

  .resumo{background:var(--bg); border-radius:var(--radius-sm); padding:13px 15px; margin-bottom:18px; font-size:13px;}
  .resumo div{display:flex; justify-content:space-between; padding:4px 0;}
  .resumo span:first-child{color:var(--ink-soft);}
  .resumo span:last-child{font-weight:600;}

  .texto{font-size:13.5px; line-height:1.7; color:rgba(26,23,20,.85); margin-bottom:14px;}

  .field-nome{margin-bottom:16px;}
  .field-nome input{
    width:100%; padding:13px 15px; border:1px solid var(--line); border-radius:10px;
    font-family:'Inter',sans-serif; font-size:14.5px; background:var(--bg);
  }
  .field-nome input:focus{outline:none; border-color:var(--accent);}
  .link-termos{
    display:inline-flex; gap:6px; color:var(--accent); font-weight:600; font-size:13px;
    text-decoration:none; border-bottom:1px solid var(--accent); padding-bottom:1px; margin-bottom:18px;
  }

  .check-term{display:flex; align-items:flex-start; gap:11px; padding:14px; background:var(--bg); border-radius:var(--radius-sm); margin-bottom:18px; cursor:pointer;}
  .check-term input{margin-top:3px; width:18px; height:18px; flex-shrink:0; accent-color:var(--accent);}
  .check-term span{font-size:13px; line-height:1.5; color:rgba(26,23,20,.85);}

  .btn{width:100%; border:none; padding:15px; border-radius:11px; font-weight:600; font-size:14.5px; cursor:pointer; font-family:'Inter',sans-serif;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:disabled{opacity:.4; cursor:default;}
  .btn-primary:not(:disabled):hover{background:#931F30;}
  .btn-ghost{background:none; border:1px solid var(--line); color:var(--ink-soft); margin-top:10px;}
  .btn-ghost:hover{border-color:var(--accent); color:var(--accent);}

  .estado-aceito{text-align:center;}
  .selo{
    width:58px; height:58px; border-radius:50%; background:var(--ok-soft); color:var(--ok);
    display:flex; align-items:center; justify-content:center; font-size:26px; margin:6px auto 16px;
  }
  .data-aceite{
    font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--ok); background:var(--ok-soft);
    border-radius:8px; padding:10px 14px; margin:14px 0 18px; display:inline-block;
  }

  .estado-erro{text-align:center; padding:20px 0; color:var(--accent); font-size:13.5px;}

  .lema{
    position:relative; z-index:1; max-width:400px; margin:22px auto 0; text-align:center;
    font-family:'Fraunces',serif; font-style:italic; font-size:12px; line-height:1.6;
    color:rgba(255,255,255,.5); padding:0 18px;
  }

  .comprovante{display:none;}
  @media print{
    body *{visibility:hidden;}
    .comprovante, .comprovante *{visibility:visible;}
    .comprovante{display:block; position:absolute; left:0; top:0; width:100%;}
    @page{margin:0;}
  }
  .cp-topo{background:var(--ink); color:#fff; padding:36px;}
  .cp-corpo{padding:28px 36px;}
  .cp-linha{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .cp-rodape{padding:20px 36px; border-top:1px solid var(--line); font-size:11px; color:var(--ink-soft);}
</style>
</head>

    <h1 class="titulo" id="titulo">Carregando...</h1>
    <div class="subtitulo" id="subtitulo"></div>
  </div>
  <div class="corpo" id="corpo"></div>
</div>

<div class="lema">"A evolução não acontece por acaso. Ela nasce da presença constante, de um método bem construído e da valorização de cada conquista, cada dificuldade e cada pessoa."</div>

<div class="comprovante" id="comprovante"></div>

<iframe name="hiddenFrameContrato" style="display:none;" title="envio em segundo plano"></iframe>

<script>
(function(){
  // ======= CONFIGURAÇÃO =======
  var GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbwxfWT6FzUK0wD_FiS9yPA6Fxp_2pg2Fox4vffOfd2wAiajbcjLMvJ5ggG1NxkuCFX8/exec";
  var CREF_TREINADORA = "CREF 020444-G/PA";
  // =============================

  var params = new URLSearchParams(window.location.search);
  var nome = (params.get('nome') || '').trim();
  var alunaEncontrada = null;
  var contratoAtual = null;

  function primeiroNome(nomeCompleto){
    return (nomeCompleto || '').trim().split(' ')[0] || 'você';
  }

  function formatarDataBR(valor){
    if (!valor) return '—';
    var d = new Date(valor);
    if (isNaN(d.getTime())) return String(valor);
    return d.toLocaleDateString('pt-BR');
  }

  // O Sheets, às vezes, entende "14:22" como horário e guarda como data
  // interna (ano 1899 característico). Isso devolve "HH:mm" limpo sempre.
  function horaLimpa(valor){
    if (!valor) return '';
    var texto = String(valor);
    if (/^\d{1,2}:\d{2}$/.test(texto)) return texto;
    var d = new Date(texto);
    if (!isNaN(d.getTime())) {
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
    return texto;
  }

  function enviarAcao(payload){
    var form = document.createElement('form');
    form.method = 'POST';
    form.action = GOOGLE_SHEETS_URL;
    form.target = 'hiddenFrameContrato';
    form.style.display = 'none';

    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify(payload);
    form.appendChild(input);

    document.body.appendChild(form);
    form.submit();
    setTimeout(function(){ if (form.parentNode) form.parentNode.removeChild(form); }, 1200);
  }

  function buscarAlunas(callback){
    var nomeCallback = '__contratoCallback' + Date.now();
    var timeout = setTimeout(function(){
      delete window[nomeCallback];
      callback(null);
    }, 12000);

    window[nomeCallback] = function(dados){
      clearTimeout(timeout);
      delete window[nomeCallback];
      tag.remove();
      callback(dados);
    };

    var tag = document.createElement('script');
    tag.src = GOOGLE_SHEETS_URL + '?callback=' + nomeCallback;
    tag.onerror = function(){ clearTimeout(timeout); delete window[nomeCallback]; callback(null); };
    document.body.appendChild(tag);
  }

  function iniciar(){
    if (!nome) {
      renderizarPedirNome();
      return;
    }
    carregarContratoDe(nome);
  }

  function renderizarPedirNome(){
    document.getElementById('titulo').textContent = 'Contrato Digital';
    document.getElementById('subtitulo').textContent = 'Consultoria Cássia Rodrigues';

    document.getElementById('corpo').innerHTML =
      '<div class="texto">Pra abrir o seu contrato, digite seu nome completo exatamente como está na sua ficha de avaliação.</div>' +
      '<div class="field-nome">' +
        '<input type="text" id="campoNomeProprio" placeholder="Seu nome completo">' +
      '</div>' +
      '<button class="btn btn-primary" id="btnContinuarNome">Continuar</button>';

    var campo = document.getElementById('campoNomeProprio');
    var btn = document.getElementById('btnContinuarNome');

    function prosseguir(){
      var valor = campo.value.trim();
      if (!valor) { campo.focus(); return; }
      nome = valor;
      carregarContratoDe(nome);
    }

    btn.addEventListener('click', prosseguir);
    campo.addEventListener('keydown', function(e){ if (e.key === 'Enter') prosseguir(); });
    campo.focus();
  }

  function carregarContratoDe(nomeBuscado){
    document.getElementById('titulo').textContent = 'Contrato Digital';
    document.getElementById('subtitulo').textContent = 'Olá, ' + primeiroNome(nomeBuscado);
    document.getElementById('corpo').innerHTML = '<div class="estado-erro" style="color:var(--ink-soft);">Carregando...</div>';

    buscarAlunas(function(lista){
      if (!lista) {
        mostrarErro('Não consegui carregar agora. Verifique sua internet e tente recarregar a página.');
        return;
      }

      var chave = nomeBuscado.toLowerCase();
      alunaEncontrada = lista.filter(function(a){
        return String(a['Nome']||'').trim().toLowerCase() === chave;
      })[0];

      if (!alunaEncontrada) {
        mostrarErro('Não encontrei esse nome no cadastro ainda. Confirme se digitou exatamente como está na sua ficha, ou fale com a Cássia.');
        return;
      }

      contratoAtual = alunaEncontrada.contrato;

      if (contratoAtual && contratoAtual['Status'] === 'Aceito') {
        renderizarAceito();
      } else {
        renderizarPendente();
      }
    });
  }

  function mostrarErro(msg){
    document.getElementById('titulo').textContent = 'Não foi possível abrir';
    document.getElementById('corpo').innerHTML = '<div class="estado-erro">' + msg + '</div>';
  }

  function renderizarPendente(){
    document.getElementById('titulo').textContent = 'Contrato Digital';

    document.getElementById('corpo').innerHTML =
      '<div class="resumo">' +
        '<div><span>Aluna</span><span>' + alunaEncontrada['Nome'] + '</span></div>' +
      '</div>' +
      '<div class="texto">Este documento formaliza a contratação dos serviços de personal training prestados por <b>Cássia Rodrigues</b>, ' + CREF_TREINADORA + '.</div>' +
      '<div class="texto">Ao aceitar, você confirma que leu e concorda integralmente com os Termos de Uso e a Política de Privacidade da Consultoria, incluindo as cláusulas sobre uso de imagem, pagamentos e tratamento de dados pessoais.</div>' +
      '<a class="link-termos" href="termos-uso.html" target="_blank" rel="noopener">Ler os Termos completos →</a>' +
      '<label class="check-term">' +
        '<input type="checkbox" id="checkAceite">' +
        '<span>Li e concordo com os Termos de Uso e a Política de Privacidade da Consultoria Cássia Rodrigues.</span>' +
      '</label>' +
      '<button class="btn btn-primary" id="btnAceitar" disabled>Aceitar contrato</button>';

    document.getElementById('checkAceite').addEventListener('change', function(e){
      document.getElementById('btnAceitar').disabled = !e.target.checked;
    });

    document.getElementById('btnAceitar').addEventListener('click', function(){
      var btn = this;
      btn.disabled = true;
      btn.textContent = 'Registrando...';

      if (!contratoAtual) {
        enviarAcao({ tipo: 'gerar_contrato', nome: alunaEncontrada['Nome'] });
        setTimeout(function(){
          enviarAcao({ tipo: 'aceitar_contrato', nome: alunaEncontrada['Nome'] });
          setTimeout(confirmarNaTela, 900);
        }, 900);
      } else {
        enviarAcao({ tipo: 'aceitar_contrato', nome: alunaEncontrada['Nome'] });
        setTimeout(confirmarNaTela, 900);
      }
    });
  }

  function confirmarNaTela(){
    var agora = new Date();
    contratoAtual = {
      'Nome': alunaEncontrada['Nome'],
      'Data Aceite': agora.toISOString(),
      'Hora Aceite': String(agora.getHours()).padStart(2,'0') + ':' + String(agora.getMinutes()).padStart(2,'0'),
      'Status': 'Aceito'
    };
    renderizarAceito();
  }

  function renderizarAceito(){
    document.getElementById('titulo').textContent = 'Contrato aceito';

    var idAluna = alunaEncontrada['ID'] || '';
    var linkAnamnese = idAluna ? 'anamnese.html?id=' + encodeURIComponent(idAluna) : 'anamnese.html';

    document.getElementById('corpo').innerHTML =
      '<div class="estado-aceito">' +
        '<div class="selo">✓</div>' +
        '<div style="font-size:13.5px; color:var(--ink-soft);">Tudo certo, ' + primeiroNome(alunaEncontrada['Nome']) + '. Seu aceite já está registrado.</div>' +
        '<div class="data-aceite">' + formatarDataBR(contratoAtual['Data Aceite']) + ' às ' + (horaLimpa(contratoAtual['Hora Aceite']) || '—') + '</div>' +
        '<a class="btn btn-primary" style="display:block; text-align:center; text-decoration:none; margin-top:6px;" href="' + linkAnamnese + '">Continuar para sua ficha de avaliação →</a>' +
        '<button class="btn btn-ghost" id="btnComprovante">Baixar comprovante</button>' +
      '</div>';

    montarComprovante();
    document.getElementById('btnComprovante').addEventListener('click', function(){ window.print(); });
  }

  function montarComprovante(){
    document.getElementById('comprovante').innerHTML =
      '<div class="cp-topo"><div class="marca" style="color:#D98994;">Consultoria Cássia Rodrigues</div><h2 style="color:#fff; margin-top:10px;">Comprovante de Aceite de Contrato</h2></div>' +
      '<div class="cp-corpo">' +
        '<div class="cp-linha"><span>Aluna</span><span>' + alunaEncontrada['Nome'] + '</span></div>' +
        '<div class="cp-linha"><span>Data do aceite</span><span>' + formatarDataBR(contratoAtual['Data Aceite']) + '</span></div>' +
        '<div class="cp-linha"><span>Horário do aceite</span><span>' + (horaLimpa(contratoAtual['Hora Aceite']) || '—') + '</span></div>' +
        '<div class="cp-linha"><span>Status</span><span>Aceito</span></div>' +
      '</div>' +
      '<div class="cp-rodape">Cássia Rodrigues — ' + CREF_TREINADORA + ' — cassiarodriguespersonal@gmail.com</div>';
  }

  iniciar();
})();
</script>

</body>
</html>
