<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrato — Consultoria Cássia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --preto:#1A1714; --branco:#FFFFFF; --cinza:#F7F4F2;
    --bordo:#7C1B2A; --bordo-suave:#F4E7E9;
    --verde:#2F6B4F; --verde-suave:#E8F1EC;
    --texto-sec:rgba(26,23,20,.62); --texto-terc:rgba(26,23,20,.40);
    --borda:rgba(26,23,20,.10);
    --serif:'Fraunces',serif; --sans:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--sans); background:var(--cinza); color:var(--preto); -webkit-font-smoothing:antialiased; padding-bottom:40px;}
  button{font-family:var(--sans); cursor:pointer;}

  .topo{background:var(--preto); color:var(--branco); padding:40px 24px 56px; position:relative; overflow:hidden;}
  .topo::after{
    content:''; position:absolute; right:-70px; top:-70px; width:240px; height:240px; border-radius:50%;
    background:radial-gradient(circle, rgba(124,27,42,.5), transparent 70%);
  }
  .marca{font-family:var(--serif); font-size:13px; color:var(--bordo); text-transform:uppercase; letter-spacing:.08em; font-weight:600; position:relative; z-index:1;}
  .titulo{font-family:var(--serif); font-size:25px; font-weight:600; margin-top:12px; position:relative; z-index:1;}
  .subtitulo{font-size:13.5px; color:rgba(255,255,255,.65); margin-top:6px; position:relative; z-index:1;}

  .conteudo{max-width:560px; margin:-30px auto 0; padding:0 16px; position:relative; z-index:2;}

  .cartao{background:var(--branco); border:1px solid var(--borda); border-radius:16px; padding:24px; margin-bottom:16px;}

  .resumo-item{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--borda); font-size:13.5px;}
  .resumo-item:last-child{border-bottom:none;}
  .resumo-item span:first-child{color:var(--texto-sec);}
  .resumo-item span:last-child{font-weight:600;}

  .texto-contrato{font-size:13.5px; line-height:1.75; color:rgba(26,23,20,.85); margin-bottom:16px;}
  .texto-contrato p + p{margin-top:10px;}

  .link-termos{
    display:inline-flex; align-items:center; gap:6px; color:var(--bordo); font-weight:600; font-size:13px;
    text-decoration:none; border-bottom:1px solid var(--bordo); padding-bottom:1px; margin-bottom:18px;
  }

  .checkbox-aceite{display:flex; align-items:flex-start; gap:11px; padding:14px; background:var(--cinza); border-radius:10px; margin-bottom:18px; cursor:pointer;}
  .checkbox-aceite input{margin-top:3px; width:18px; height:18px; flex-shrink:0; accent-color:var(--bordo);}
  .checkbox-aceite span{font-size:13px; line-height:1.5; color:rgba(26,23,20,.85);}

  .btn-aceitar{
    width:100%; background:var(--bordo); color:var(--branco); border:none; padding:15px;
    border-radius:10px; font-weight:600; font-size:14.5px; transition:opacity .15s ease;
  }
  .btn-aceitar:disabled{opacity:.4; cursor:default;}
  .btn-aceitar:not(:disabled):hover{background:#931F30;}

  .estado-aceito{text-align:center; padding:10px 0;}
  .selo-aceito{
    width:60px; height:60px; border-radius:50%; background:var(--verde-suave); color:var(--verde);
    display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 16px;
  }
  .estado-aceito h2{font-family:var(--serif); font-size:19px; font-weight:600; margin-bottom:8px;}
  .estado-aceito p{font-size:13.5px; color:var(--texto-sec); line-height:1.6;}
  .estado-aceito .data-aceite{
    font-family:var(--mono); font-size:12.5px; color:var(--verde); background:var(--verde-suave);
    border-radius:8px; padding:10px 14px; margin-top:16px; display:inline-block;
  }
  .btn-baixar-comprovante{
    margin-top:18px; background:none; border:1px solid var(--borda); color:var(--texto-sec);
    padding:11px 18px; border-radius:9px; font-size:13px; font-weight:600;
  }
  .btn-baixar-comprovante:hover{border-color:var(--bordo); color:var(--bordo);}

  .estado-erro{text-align:center; padding:60px 20px; color:var(--bordo); font-size:13.5px;}

  .comprovante{display:none;}
  @media print{
    body *{visibility:hidden;}
    .comprovante, .comprovante *{visibility:visible;}
    .comprovante{display:block; position:absolute; left:0; top:0; width:100%;}
    @page{margin:0;}
    .cp-capa{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
  }
  .cp-capa{background:var(--preto); color:var(--branco); padding:40px;}
  .cp-marca{font-family:var(--serif); font-size:13px; color:var(--bordo); text-transform:uppercase; letter-spacing:.08em; font-weight:600;}
  .cp-titulo{font-family:var(--serif); font-size:24px; font-weight:600; margin-top:14px;}
  .cp-corpo{padding:32px 40px;}
  .cp-linha{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--borda); font-size:13px;}
  .cp-rodape{padding:24px 40px; border-top:1px solid var(--borda); font-size:11px; color:var(--texto-terc);}
</style>
</head>
<body>

<div class="topo">
  <div class="marca">Consultoria Cássia Rodrigues</div>
  <div class="titulo">Contrato Digital</div>
  <div class="subtitulo" id="subtitulo">Carregando...</div>
</div>

<div class="conteudo" id="conteudo"></div>
<div class="comprovante" id="comprovante"></div>

<script>
  // ======================================================
  // Cole aqui a URL do Apps Script de Cadastro implantado
  // ======================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxfWT6FzUK0wD_FiS9yPA6Fxp_2pg2Fox4vffOfd2wAiajbcjLMvJ5ggG1NxkuCFX8/exec';

  const params = new URLSearchParams(window.location.search);
  const idAluna = params.get('id');

  let alunaCarregada = null;
  let contratoCarregado = null;

  async function apiGet(action, extraParams) {
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', action);
    Object.keys(extraParams || {}).forEach(function (k) { url.searchParams.set(k, extraParams[k]); });
    const resp = await fetch(url.toString());
    return resp.json();
  }

  async function apiPost(corpo) {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(corpo)
    });
    return resp.json();
  }

  function formatarDataBR(iso) {
    if (!iso) return '—';
    const partes = String(iso).slice(0, 10).split('-');
    return partes[2] + '/' + partes[1] + '/' + partes[0];
  }

  async function iniciar() {
    if (!idAluna) {
      mostrarErro('Esse link não tem o código de identificação. Confirme com a Cássia.');
      return;
    }

    try {
      const aluna = await apiGet('buscarAluna', { id: idAluna });
      if (aluna.erro) { mostrarErro(aluna.erro + '. Confirme o link com a Cássia.'); return; }
      alunaCarregada = aluna;

      const contrato = await apiGet('buscarContrato', { id: idAluna });
      if (contrato.erro) { mostrarErro('Nenhum contrato foi gerado para você ainda. Avise a Cássia.'); return; }
      contratoCarregado = contrato;

      document.getElementById('subtitulo').textContent = 'Olá, ' + aluna.nome.split(' ')[0];

      if (contrato.status === 'aceito') {
        renderizarAceito();
      } else {
        renderizarPendente();
      }
    } catch (e) {
      mostrarErro('Não consegui carregar agora. Verifique sua internet e tente recarregar.');
    }
  }

  function mostrarErro(msg) {
    document.getElementById('subtitulo').textContent = 'Não foi possível abrir';
    document.getElementById('conteudo').innerHTML = '<div class="estado-erro">' + msg + '</div>';
  }

  function renderizarPendente() {
    const conteudo = document.getElementById('conteudo');
    conteudo.innerHTML =
      '<div class="cartao">' +
        '<div class="resumo-item"><span>Aluna</span><span>' + alunaCarregada.nome + '</span></div>' +
        '<div class="resumo-item"><span>ID</span><span>' + alunaCarregada.id + '</span></div>' +
        '<div class="resumo-item"><span>Data de geração</span><span>' + formatarDataBR(contratoCarregado.dataGeracao) + '</span></div>' +
      '</div>' +

      '<div class="cartao">' +
        '<div class="texto-contrato">' +
          '<p>Este documento formaliza a contratação dos serviços de personal training prestados por <b>Cássia Rodrigues</b>, CREF 020444-G/PA, junto a <b>' + alunaCarregada.nome + '</b>.</p>' +
          '<p>Ao aceitar este contrato, você confirma que leu e concorda integralmente com os Termos de Uso e a Política de Privacidade da Consultoria Cássia Rodrigues, incluindo as cláusulas sobre uso de imagem, pagamentos e tratamento de dados pessoais.</p>' +
        '</div>' +
        '<a class="link-termos" href="termos-uso.html" target="_blank">Ler os Termos completos →</a>' +

        '<label class="checkbox-aceite">' +
          '<input type="checkbox" id="checkAceite">' +
          '<span>Li e concordo com os Termos de Uso e a Política de Privacidade da Consultoria Cássia Rodrigues.</span>' +
        '</label>' +

        '<button class="btn-aceitar" id="btnAceitar" disabled>Aceitar contrato</button>' +
      '</div>';

    document.getElementById('checkAceite').addEventListener('change', function (e) {
      document.getElementById('btnAceitar').disabled = !e.target.checked;
    });

    document.getElementById('btnAceitar').addEventListener('click', async function () {
      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Registrando...';

      const resultado = await apiPost({ action: 'aceitarContrato', idContrato: contratoCarregado.id });
      if (resultado.erro) {
        btn.disabled = false;
        btn.textContent = 'Aceitar contrato';
        return;
      }

      const agora = new Date();
      contratoCarregado.status = 'aceito';
      contratoCarregado.dataAceite = agora.toISOString().slice(0, 10);
      contratoCarregado.horaAceite = String(agora.getHours()).padStart(2, '0') + ':' + String(agora.getMinutes()).padStart(2, '0');

      renderizarAceito();
    });
  }

  function renderizarAceito() {
    const conteudo = document.getElementById('conteudo');
    conteudo.innerHTML =
      '<div class="cartao estado-aceito">' +
        '<div class="selo-aceito">✓</div>' +
        '<h2>Contrato aceito</h2>' +
        '<p>Tudo certo, ' + alunaCarregada.nome.split(' ')[0] + '. Seu aceite foi registrado com sucesso.</p>' +
        '<div class="data-aceite">' + formatarDataBR(contratoCarregado.dataAceite) + ' às ' + contratoCarregado.horaAceite + '</div>' +
        '<div><button class="btn-baixar-comprovante" id="btnComprovante">Baixar comprovante</button></div>' +
      '</div>';

    montarComprovante();
    document.getElementById('btnComprovante').addEventListener('click', function () { window.print(); });
  }

  function montarComprovante() {
    document.getElementById('comprovante').innerHTML =
      '<div class="cp-capa">' +
        '<div class="cp-marca">Consultoria Cássia Rodrigues</div>' +
        '<div class="cp-titulo">Comprovante de Aceite de Contrato</div>' +
      '</div>' +
      '<div class="cp-corpo">' +
        '<div class="cp-linha"><span>Aluna</span><span>' + alunaCarregada.nome + '</span></div>' +
        '<div class="cp-linha"><span>ID</span><span>' + alunaCarregada.id + '</span></div>' +
        '<div class="cp-linha"><span>Versão dos termos aceitos</span><span>' + contratoCarregado.versao + '</span></div>' +
        '<div class="cp-linha"><span>Data do aceite</span><span>' + formatarDataBR(contratoCarregado.dataAceite) + '</span></div>' +
        '<div class="cp-linha"><span>Horário do aceite</span><span>' + contratoCarregado.horaAceite + '</span></div>' +
        '<div class="cp-linha"><span>Status</span><span>Aceito</span></div>' +
      '</div>' +
      '<div class="cp-rodape">Cássia Rodrigues — CREF 020444-G/PA — cassiarodriguespersonal@gmail.com</div>';
  }

  iniciar();
</script>

</body>
</html>
