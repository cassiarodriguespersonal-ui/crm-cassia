<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso — Consultoria Cássia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --preto:#1A1714;
    --branco:#FFFFFF;
    --cinza:#F7F4F2;
    --bordo:#7C1B2A;
    --texto-sec:rgba(26,23,20,.6);
    --serif:'Fraunces',serif;
    --sans:'Inter',sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:var(--preto);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    padding:20px;
  }
  body::before{
    content:'';
    position:absolute;
    top:-120px; left:50%;
    transform:translateX(-50%);
    width:480px; height:480px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(124,27,42,.45), transparent 70%);
    pointer-events:none;
  }
  .cartao{
    position:relative; z-index:1;
    background:var(--branco);
    width:100%; max-width:380px;
    border-radius:18px;
    padding:40px 34px 34px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.5);
    text-align:center;
  }
  .marca{font-family:var(--serif); font-weight:600; font-size:18px; color:var(--preto);}
  .marca span{display:block; font-family:var(--sans); font-weight:400; font-size:11.5px; color:var(--texto-sec); letter-spacing:.04em; margin-top:4px;}
  .titulo{font-family:var(--serif); font-size:22px; font-weight:600; margin:26px 0 6px;}
  .subtitulo{font-size:13.5px; color:var(--texto-sec); margin-bottom:26px;}
  .campo-senha{position:relative; margin-bottom:14px;}
  .campo-senha input{
    width:100%; padding:13px 44px 13px 16px;
    border:1.5px solid rgba(26,23,20,.12); border-radius:10px;
    font-family:var(--mono); font-size:15px; background:var(--cinza);
    letter-spacing:.05em; transition:border-color .15s ease;
  }
  .campo-senha input:focus{outline:none; border-color:var(--bordo);}
  .alternar-visibilidade{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; padding:8px; color:var(--texto-sec); display:flex;
  }
  .erro{font-size:12.5px; color:var(--bordo); margin-bottom:14px; min-height:16px; font-weight:500;}
  .btn-entrar{
    width:100%; background:var(--bordo); color:var(--branco); border:none;
    padding:14px; border-radius:10px; font-weight:600; font-size:14.5px;
    cursor:pointer; transition:background .15s ease, transform .1s ease;
  }
  .btn-entrar:hover{background:#931F30;}
  .btn-entrar:active{transform:scale(.98);}
  .rodape-nota{margin-top:22px; font-size:11px; color:rgba(26,23,20,.38); line-height:1.5;}
  .tremer{animation:tremer .35s ease;}
  @keyframes tremer{
    25%{transform:translateX(-6px);} 50%{transform:translateX(6px);}
    75%{transform:translateX(-4px);} 100%{transform:translateX(0);}
  }
</style>
</head>
<body>

<div class="cartao" id="cartao">
  <div class="marca">Cássia Rodrigues<span>Acesso administrativo</span></div>
  <div class="titulo">Bem-vinda de volta</div>
  <div class="subtitulo">Digite sua senha para abrir o painel</div>

  <form id="formLogin" autocomplete="off">
    <div class="campo-senha">
      <input type="password" id="campoSenha" placeholder="Senha" autofocus>
      <button type="button" class="alternar-visibilidade" id="btnOlho" aria-label="Mostrar senha">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="erro" id="msgErro"></div>
    <button type="submit" class="btn-entrar">Entrar</button>
  </form>

  <div class="rodape-nota">Acesso protegido por senha local.</div>
</div>

<script>
  // ======================================================
  // É SÓ TROCAR A PALAVRA AQUI ENTRE ASPAS PELA SUA SENHA
  // ======================================================
  const SENHA = 'troque-esta-senha';

  // Para qual página o login leva, depois de certo
  const DESTINO = 'index.html';

  // Quantas horas o login fica valendo antes de pedir de novo
  const HORAS_SESSAO = 12;

  const form = document.getElementById('formLogin');
  const campoSenha = document.getElementById('campoSenha');
  const msgErro = document.getElementById('msgErro');
  const cartao = document.getElementById('cartao');
  const btnOlho = document.getElementById('btnOlho');

  btnOlho.addEventListener('click', function () {
    campoSenha.type = campoSenha.type === 'password' ? 'text' : 'password';
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    if (campoSenha.value === SENHA) {
      const expiraEm = Date.now() + HORAS_SESSAO * 60 * 60 * 1000;
      sessionStorage.setItem('cassia_admin_auth', 'ok');
      sessionStorage.setItem('cassia_admin_auth_expira', String(expiraEm));
      window.location.href = DESTINO;
    } else {
      msgErro.textContent = 'Senha incorreta. Tente novamente.';
      campoSenha.value = '';
      campoSenha.focus();
      cartao.classList.remove('tremer');
      void cartao.offsetWidth;
      cartao.classList.add('tremer');
    }
  });
</script>

</body>
</html>
